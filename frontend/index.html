<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChargeWise AI</title>
  <style>
    /* ── Prevent horizontal overflow bleed — fixes hamburger panel scroll artifact ── */
    html {
      overflow-x: hidden;
      overscroll-behavior-x: none;
    }

    body {
      overflow-x: hidden;
      width: 100%;
      max-width: 100vw;
      overscroll-behavior-x: none;
      margin: 0;
      padding: 0;
    }

    #root {
      overflow-x: clip;
      /* clip (not hidden) — does NOT create a scroll container */
      width: 100%;
      position: relative;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
